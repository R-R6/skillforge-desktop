name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows x64 NSIS
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Assert Node architecture
        shell: bash
        run: |
          set -euo pipefail
          echo "uname -m: $(uname -m)"
          node_arch="$(node -p "process.arch")"
          echo "node arch: ${node_arch}"
          if [[ "${node_arch}" != "x64" ]]; then
            echo "error: Windows job requires x64 Node runtime" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build Windows installer
        run: npm run package:win

      - name: Verify Windows installer
        shell: bash
        run: |
          set -euo pipefail
          installers=()
          while IFS= read -r candidate; do
            installers+=("${candidate}")
          done < <(find release -maxdepth 1 -type f -name "*.exe" | sort)
          if [[ "${#installers[@]}" -ne 1 ]]; then
            echo "error: expected exactly one NSIS installer, found ${#installers[@]}" >&2
            printf '%s\n' "${installers[@]:-}" >&2
            ls -la release >&2 || true
            exit 1
          fi
          installer="${installers[0]}"
          echo "installer: ${installer}"
          if [[ "${installer}" == *".dmg" ]]; then
            echo "error: Windows job produced a DMG artifact" >&2
            exit 1
          fi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installer
          path: release/*.exe
          if-no-files-found: error

  build-macos-arm64:
    name: macOS ARM64 DMG
    runs-on: macos-15
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert runner architecture
        run: |
          set -euo pipefail
          runner_arch="$(uname -m)"
          echo "uname -m: ${runner_arch}"
          if [[ "${runner_arch}" != "arm64" ]]; then
            echo "error: ARM64 job must run on a native arm64 runner" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Assert Node architecture
        run: |
          set -euo pipefail
          node_arch="$(node -p "process.arch")"
          echo "node arch: ${node_arch}"
          if [[ "${node_arch}" != "arm64" ]]; then
            echo "error: ARM64 job requires arm64 Node runtime" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build macOS ARM64 DMG
        run: npm run package:mac:arm64

      - name: Verify macOS ARM64 DMG
        run: bash scripts/verify-mac-dmg.sh arm64

      - name: Upload macOS ARM64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: release/SkillForge-*-macos-arm64.dmg
          if-no-files-found: error

  build-macos-x64:
    name: macOS Intel x64 DMG
    runs-on: macos-15-intel
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert runner architecture
        run: |
          set -euo pipefail
          runner_arch="$(uname -m)"
          echo "uname -m: ${runner_arch}"
          if [[ "${runner_arch}" != "x86_64" ]]; then
            echo "error: Intel job must run on a native x86_64 runner" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Assert Node architecture
        run: |
          set -euo pipefail
          node_arch="$(node -p "process.arch")"
          echo "node arch: ${node_arch}"
          if [[ "${node_arch}" != "x64" ]]; then
            echo "error: Intel job requires x64 Node runtime" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build macOS Intel DMG
        run: npm run package:mac:x64

      - name: Verify macOS Intel DMG
        run: bash scripts/verify-mac-dmg.sh x86_64

      - name: Upload macOS Intel DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-dmg
          path: release/SkillForge-*-macos-x64.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-installer
          path: artifacts/windows

      - name: Download macOS ARM64 DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-dmg
          path: artifacts/macos-arm64

      - name: Download macOS Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-dmg
          path: artifacts/macos-x64

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r candidate; do
            files+=("${candidate}")
          done < <(find artifacts -type f | sort)
          if [[ "${#files[@]}" -ne 3 ]]; then
            echo "error: expected exactly 3 release artifacts, found ${#files[@]}" >&2
            printf '%s\n' "${files[@]:-}" >&2
            exit 1
          fi

          declare -A seen=()
          for file in "${files[@]}"; do
            base="$(basename "${file}")"
            if [[ -n "${seen[$base]:-}" ]]; then
              echo "error: duplicate artifact name: ${base}" >&2
              exit 1
            fi
            seen["$base"]=1
            echo "artifact: ${file}"
          done

          find artifacts -type f -name "*.exe" | grep -q .
          find artifacts -type f -name "*-macos-arm64.dmg" | grep -q .
          find artifacts -type f -name "*-macos-x64.dmg" | grep -q .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/windows/*
            artifacts/macos-arm64/*
            artifacts/macos-x64/*
          body: |
            ## 下载说明

            - Windows 10/11（x64）：下载 `.exe` 安装程序
            - Apple Silicon（M1 / M2 / M3 / M4 等）：下载 `*-macos-arm64.dmg`
            - Intel Mac：下载 `*-macos-x64.dmg`

            ## macOS 安装（未公证）

            macOS DMG 使用 ad-hoc 临时签名，**未**使用 Apple 开发者证书，也**未**公证。

            1. 打开 DMG，将 `SkillForge Desktop.app` 拖到“应用程序”。
            2. 优先在 Finder 中右键（或 Control 单击）应用，选择“打开”。
            3. 若仍被 Gatekeeper 拦截，再执行：

            ```bash
            xattr -dr com.apple.quarantine "/Applications/SkillForge Desktop.app"
            ```

            默认不需要 `sudo`。这不代表应用已通过 Apple 认证。
